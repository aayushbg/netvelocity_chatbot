version: "3.1"

rules:
- rule: Say goodbye anytime the user says goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Say I am a bot anytime the user challenges
  steps:
    - intent: bot_challenge
    - action: utter_iamabot

- rule: Handle metric lookup requests
  steps:
    - intent: get_metrics
    - action: action_kpi_router

- rule: Handle metric ranking requests
  steps:
    - intent: rank_metrics
    - action: action_kpi_router

- rule: Handle metric threshold requests
  steps:
    - intent: threshold_metrics
    - action: action_kpi_router

- rule: Handle metric comparison requests
  steps:
    - intent: compare_metrics
    - action: action_kpi_router

- rule: Handle metric correlation requests
  steps:
    - intent: correlation
    - action: action_kpi_router

- rule: Handle top locations requests
  steps:
    - intent: top_locations
    - action: action_kpi_router

- rule: Handle metric breakdown requests
  steps:
    - intent: breakdown_metrics
    - action: action_kpi_router
