version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - get_metrics
  - rank_metrics
  - threshold_metrics
  - compare_metrics

entities:
  - metric
  - time
  - geo
  - app
  - tech
  - band
  - agg
  - compare_time
  - threshold
  - topN
  - dimension
  - granularity
  - operator

slots:
  metric:
    type: list
    mappings:
      - type: from_entity
        entity: metric
  time:
    type: list
    mappings:
      - type: from_entity
        entity: time
  geo:
    type: list
    mappings:
      - type: from_entity
        entity: geo
  app:
    type: list
    mappings:
      - type: from_entity
        entity: app
  tech:
    type: list
    mappings:
      - type: from_entity
        entity: tech
  band:
    type: list
    mappings:
      - type: from_entity
        entity: band
  agg:
    type: list
    mappings:
      - type: from_entity
        entity: agg
  compare_time:
    type: list
    mappings:
      - type: from_entity
        entity: compare_time
  threshold:
    type: list
    mappings:
      - type: from_entity
        entity: threshold
  topN:
    type: list
    mappings:
      - type: from_entity
        entity: topN
  dimension:
    type: list
    mappings:
      - type: from_entity
        entity: dimension
  granularity:
    type: list
    mappings:
      - type: from_entity
        entity: granularity
  operator:
    type: list
    mappings:
      - type: from_entity
        entity: operator

responses:
  utter_greet:
    - text: "Hey! How are you?"
  utter_cheer_up:
    - text: "Here is something to cheer you up:"
      image: "https://i.imgur.com/nGF1K8f.jpg"
  utter_did_that_help:
    - text: "Did that help you?"
  utter_happy:
    - text: "Great, carry on!"
  utter_goodbye:
    - text: "Bye"
  utter_iamabot:
    - text: "I am a bot, powered by Rasa."

actions:
  - action_kpi_router

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
